<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Экраны загрузки - варианты</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;500;600;700;800&family=Manrope:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,600&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;500;600;700;800&family=Manrope:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,600&display=swap" rel="stylesheet"></noscript>

  <style>
    :root {
      --bg: #f0ede6;
      --bg-deep: #e8e4d9;
      --text: #2a2a24;
      --muted: #6d6d63;
      --khaki: #4B5320;
      --khaki-light: #8a9848;
      --khaki-deep: #3a4118;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      font-family: 'Manrope', sans-serif;
      background: #222;
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Label bar at top of page to mark each variant */
    .demo-wrap {
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: 100vh;
    }

    .demo-col {
      position: relative;
      background: var(--bg);
      overflow: hidden;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }

    .demo-col + .demo-col {
      border-left: 1px solid rgba(75, 83, 32, 0.18);
    }

    .demo-label {
      position: absolute;
      top: 24px;
      left: 24px;
      z-index: 10;
      font-family: 'Unbounded', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--khaki-deep);
      background: rgba(240, 237, 230, 0.85);
      backdrop-filter: blur(8px);
      padding: 8px 14px;
      border-radius: 999px;
      border: 1px solid rgba(75, 83, 32, 0.2);
    }

    /* subtle paper texture on light bg */
    .demo-col::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 50%, rgba(255,255,255,0.4) 0%, transparent 70%),
        linear-gradient(180deg, #f3f0e8 0%, #e8e4d9 100%);
      pointer-events: none;
      z-index: 0;
    }

    /* ====================================================
       VARIANT 1 - Apple-style minimal
       ==================================================== */
    .v1 {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 80px;
    }

    .v1__logo {
      width: 96px;
      height: 96px;
      display: block;
    }

    .v1__bar {
      width: 220px;
      height: 4px;
      border-radius: 99px;
      background: rgba(75, 83, 32, 0.15);
      overflow: hidden;
      position: relative;
    }

    .v1__bar-fill {
      position: absolute;
      left: 0;
      top: 0;
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--khaki-deep), var(--khaki), var(--khaki-light));
      border-radius: 99px;
      animation: loadV1 3.2s cubic-bezier(.4,.0,.2,1) infinite;
    }

    @keyframes loadV1 {
      0%   { width: 0%; }
      50%  { width: 68%; }
      80%  { width: 92%; }
      100% { width: 100%; }
    }

    /* ====================================================
       VARIANT 2 - Editorial (logo + wordmark + percentage)
       ==================================================== */
    .v2 {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 560px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-height: 70vh;
      align-items: center;
    }

    .v2__top {
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .v2__logo {
      width: 80px;
      height: 80px;
      flex-shrink: 0;
    }

    .v2__wordmark {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .v2__title {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 700;
      font-size: 52px;
      line-height: 1;
      letter-spacing: 0.08em;
      color: var(--text);
    }

    .v2__subtitle {
      font-family: 'Manrope', sans-serif;
      font-weight: 500;
      font-size: 12px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .v2__center {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      padding-left: 60px;
      gap: 14px;
    }

    .v2__percent {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 700;
      font-style: italic;
      font-size: 92px;
      line-height: 1;
      color: var(--khaki);
    }

    .v2__bar {
      width: 300px;
      height: 1px;
      background: rgba(75, 83, 32, 0.25);
      position: relative;
      overflow: hidden;
    }

    .v2__bar-fill {
      position: absolute;
      left: 0;
      top: -1px;
      height: 3px;
      width: 0%;
      background: linear-gradient(90deg, var(--khaki-deep), var(--khaki-light), #c9a961);
      box-shadow: 0 0 10px rgba(138, 152, 72, 0.5);
      animation: loadV2 3.2s cubic-bezier(.4,.0,.2,1) infinite;
    }

    @keyframes loadV2 {
      0%   { width: 0%; }
      30%  { width: 42%; }
      60%  { width: 74%; }
      85%  { width: 92%; }
      100% { width: 100%; }
    }

    .v2__hint {
      align-self: center;
      font-family: 'Manrope', sans-serif;
      font-size: 11px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ====================================================
       MOBILE
       ==================================================== */
    @media (max-width: 900px) {
      .demo-wrap { grid-template-columns: 1fr; }
      .demo-col { min-height: 100vh; }
      .demo-col + .demo-col { border-left: 0; border-top: 1px solid rgba(75, 83, 32, 0.18); }
      .v2__title { font-size: 36px; }
      .v2__percent { font-size: 72px; }
      .v2__center { padding-left: 0; }
    }
  </style>
</head>
<body>

  <div class="demo-wrap">

    <!-- VARIANT 1: Apple-style minimal -->
    <div class="demo-col">
      <span class="demo-label">Вариант 1 - минимализм</span>

      <div class="v1">
        <img src="assets/logo.svg" alt="Логотип Ликвидатор" class="v1__logo" onerror="this.replaceWith(Object.assign(document.createElement('div'),{style:'width:96px;height:96px;border-radius:16px;background:#4B5320;display:flex;align-items:center;justify-content:center;color:#f0ede6;font-family:Unbounded,sans-serif;font-weight:700;font-size:32px;',textContent:'Л'}))"/>
        <div class="v1__bar"><div class="v1__bar-fill"></div></div>
      </div>
    </div>

    <!-- VARIANT 2: Editorial with wordmark + percentage -->
    <div class="demo-col">
      <span class="demo-label">Вариант 2 - редакторский</span>

      <div class="v2">
        <div class="v2__top">
          <img src="assets/logo.svg" alt="Логотип Ликвидатор" class="v2__logo" onerror="this.replaceWith(Object.assign(document.createElement('div'),{style:'width:80px;height:80px;border-radius:12px;background:#4B5320;display:flex;align-items:center;justify-content:center;color:#f0ede6;font-family:Unbounded,sans-serif;font-weight:700;font-size:28px;flex-shrink:0',textContent:'Л'}))"/>
          <div class="v2__wordmark">
            <div class="v2__title">ЛИКВИДАТОР</div>
            <div class="v2__subtitle">Юридическая компания</div>
          </div>
        </div>

        <div class="v2__center">
          <div class="v2__percent" id="v2Percent">0%</div>
          <div class="v2__bar"><div class="v2__bar-fill"></div></div>
        </div>

        <div class="v2__hint">Загрузка</div>
      </div>
    </div>

  </div>

  <script>
    // Animate percentage counter for V2 in sync with the bar animation
    (function(){
      const el = document.getElementById('v2Percent');
      if (!el) return;
      const DURATION = 3200;
      let start = performance.now();
      function frame(now){
        const t = ((now - start) % DURATION) / DURATION;
        let pct;
        if (t < 0.30)      pct = (t / 0.30) * 42;
        else if (t < 0.60) pct = 42 + ((t - 0.30) / 0.30) * 32;
        else if (t < 0.85) pct = 74 + ((t - 0.60) / 0.25) * 18;
        else               pct = 92 + ((t - 0.85) / 0.15) * 8;
        el.textContent = Math.round(pct) + '%';
        requestAnimationFrame(frame);
      }
      requestAnimationFrame(frame);
    })();
  </script>
</body>
</html>
